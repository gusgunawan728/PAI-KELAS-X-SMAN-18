function load(){
let q=document.getElementById("quiz");
questions.forEach((x,i)=>{
let h=`<div class="question"><h3>${x.q}</h3>`;
x.o.forEach((o,j)=>{
h+=`<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`;
});
h+=`</div>`;
q.innerHTML+=h;
});
}
load();

function submitQuiz(){
let s=0;
questions.forEach((x,i)=>{
let a=document.querySelector(`input[name="q${i}"]:checked`);
if(a&&parseInt(a.value)==x.a)s++;
});
document.getElementById("result").innerHTML=`Skor Anda: ${s}/45`;
}
